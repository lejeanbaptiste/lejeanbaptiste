service:
  externalPort: 3000
  internalPort: 3000
livenessProbe:
  path: "/favicon-32x32.png"
  initialDelaySeconds: 10
  timeoutSeconds: 10
readinessProbe:
  path: "/favicon-32x32.png"
  initialDelaySeconds: 10
  timeoutSeconds: 10
ingress:
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    cert-manager.io/cluster-issuer: letsencrypt
