name: Release desktop builds

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref to build
        required: true
        default: main
      release_tag:
        description: Existing release tag to receive assets
        required: true
        default: v0.0.1
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux-deb:
    name: Build Linux .deb (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            script: build:desktop:linux:amd64
          - arch: arm64
            script: build:desktop:linux:arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Install dependencies
        run: npm ci

      - name: Build desktop package
        run: |
          attempts=3
          for attempt in $(seq 1 "$attempts"); do
            echo "Running ${{ matrix.script }} attempt $attempt of $attempts"
            package_exit=0
            npm run ${{ matrix.script }} || package_exit=$?
            if [ "$package_exit" -eq 0 ]; then
              exit 0
            fi
            if [ "$attempt" -eq "$attempts" ]; then
              exit "$package_exit"
            fi
            echo "${{ matrix.script }} failed with exit code $package_exit. Waiting before retry..."
            sleep $((10 * attempt))
          done

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-${{ matrix.arch }}
          path: apps/desktop/release/*.deb
          if-no-files-found: error

  linux-flatpak:
    name: Build Linux Flatpak
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install flatpak tooling
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin flatpak flatpak-builder

      - name: Add Flathub remote
        run: flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install dependencies
        run: npm ci

      - name: Build Flatpak
        run: |
          attempts=3
          for attempt in $(seq 1 "$attempts"); do
            echo "Running build:desktop:flatpak:ci attempt $attempt of $attempts"
            package_exit=0
            npm run build:desktop:flatpak:ci || package_exit=$?
            if [ "$package_exit" -eq 0 ]; then
              exit 0
            fi
            if [ "$attempt" -eq "$attempts" ]; then
              exit "$package_exit"
            fi
            echo "build:desktop:flatpak:ci failed with exit code $package_exit. Waiting before retry..."
            sleep $((10 * attempt))
          done

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: apps/desktop/release/*.flatpak
          if-no-files-found: error

  macos-pkg:
    name: Build macOS .pkg (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    # Signing and notarization secrets live in the protected "release"
    # environment (restricted to v* tags).
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          # The bundled Python/LemMinX runtimes are downloaded for the host
          # architecture (process.arch), so each arch builds on a native runner.
          - arch: arm64
            runner: macos-latest
          - arch: x64
            runner: macos-15-intel

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write notary API key
        env:
          APPLE_NOTARY_API_PRIVATE_KEY_P8: ${{ secrets.APPLE_NOTARY_API_PRIVATE_KEY_P8 }}
        run: printf '%s\n' "$APPLE_NOTARY_API_PRIVATE_KEY_P8" > "$RUNNER_TEMP/notary_key.p8"

      - name: Build signed and notarized package
        env:
          # electron-builder imports these into a temporary keychain and signs
          # the app (Developer ID Application) and the .pkg (Developer ID
          # Installer), then notarizes the app with the API key below.
          CSC_LINK: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          CSC_INSTALLER_LINK: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_P12_BASE64 }}
          CSC_INSTALLER_KEY_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_P12_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/notary_key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm run build:desktop:mac:release

      - name: Notarize and staple installer
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          # electron-builder notarizes the .app; the .pkg wrapping it must be
          # notarized as its own artifact, then stapled so installs work
          # offline. Checksums are computed downstream, after stapling.
          for pkg in apps/desktop/release/*.pkg; do
            echo "Notarizing $pkg"
            SUBMISSION="$(xcrun notarytool submit "$pkg" \
              --key "$RUNNER_TEMP/notary_key.p8" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait --timeout 1h --output-format json)"
            echo "$SUBMISSION"
            STATUS="$(echo "$SUBMISSION" | jq -r .status)"
            if [ "$STATUS" != "Accepted" ]; then
              echo "::error::Notarization of $pkg failed with status '$STATUS'. Log:"
              xcrun notarytool log "$(echo "$SUBMISSION" | jq -r .id)" \
                --key "$RUNNER_TEMP/notary_key.p8" \
                --key-id "$APPLE_API_KEY_ID" \
                --issuer "$APPLE_API_ISSUER" || true
              exit 1
            fi
            xcrun stapler staple "$pkg"
            spctl --assess -vv --type install "$pkg"
          done
          rm -f "$RUNNER_TEMP/notary_key.p8"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            apps/desktop/release/*.pkg
            apps/desktop/release/*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - linux-deb
      - linux-flatpak
      - macos-pkg
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download .deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: linux-deb-*
          path: release-assets/debs
          merge-multiple: true

      - name: Download Flatpak artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-flatpak
          path: release-assets/flatpak

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          path: release-assets/mac
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum release-assets/debs/*.deb release-assets/flatpak/*.flatpak release-assets/mac/* > release-assets/SHA256SUMS

      # Provenance for every asset; verify with:
      #   gh attestation verify <file> --repo <owner>/<repo>
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            release-assets/debs/*.deb
            release-assets/flatpak/*.flatpak
            release-assets/mac/*
            release-assets/SHA256SUMS

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ inputs.release_tag || github.ref_name }}"
          if ! gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" --generate-notes
          fi
          gh release upload "$TAG_NAME" --repo "$GITHUB_REPOSITORY" \
            release-assets/SHA256SUMS \
            release-assets/debs/*.deb \
            release-assets/flatpak/*.flatpak \
            release-assets/mac/* \
            --clobber

  # Releases created with GITHUB_TOKEN do not fire the "release: published"
  # trigger, so the apt deployment is called directly instead.
  apt-repo:
    name: Publish apt repository
    needs: publish
    permissions:
      contents: write
      pages: write
      id-token: write
    uses: ./.github/workflows/publish-apt.yml
    with:
      release_tag: ${{ inputs.release_tag || github.ref_name }}
    secrets: inherit
