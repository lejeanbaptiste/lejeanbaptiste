name: CI
run-name: CI for lejeanbaptiste/lejeanbaptiste

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref to build
        required: true
        default: main
      release_tag:
        description: Existing release tag to receive desktop assets
        required: true
        default: v0.0.1
  release:
    types: [created]

permissions:
  contents: write

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Run linter
        run: npm run lint

  desktop-linux:
    name: Build Linux desktop package (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            script: build:desktop:linux:amd64
          - arch: arm64
            script: build:desktop:linux:arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux desktop package
        run: |
          attempts=3
          for attempt in $(seq 1 "$attempts"); do
            echo "Running ${{ matrix.script }} attempt $attempt of $attempts"
            package_exit=0
            npm run ${{ matrix.script }} || package_exit=$?
            if [ "$package_exit" -eq 0 ]; then
              exit 0
            fi
            if [ "$attempt" -eq "$attempts" ]; then
              exit "$package_exit"
            fi
            echo "${{ matrix.script }} failed with exit code $package_exit. Waiting before retry..."
            sleep $((10 * attempt))
          done

  desktop-flatpak:
    name: Build Linux desktop Flatpak
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install flatpak tooling
        run: sudo apt-get update && sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub remote
        run: flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install dependencies
        run: npm ci

      - name: Build Flatpak
        run: |
          attempts=3
          for attempt in $(seq 1 "$attempts"); do
            echo "Running build:desktop:flatpak:ci attempt $attempt of $attempts"
            package_exit=0
            npm run build:desktop:flatpak:ci || package_exit=$?
            if [ "$package_exit" -eq 0 ]; then
              exit 0
            fi
            if [ "$attempt" -eq "$attempts" ]; then
              exit "$package_exit"
            fi
            echo "build:desktop:flatpak:ci failed with exit code $package_exit. Waiting before retry..."
            sleep $((10 * attempt))
          done

  desktop-macos:
    name: Build macOS desktop application (Apple silicon)
    # macos-15 runners are arm64; the build produces an arm64-only pkg.
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import code-signing certificates
        env:
          # Developer ID Application (signs the app) and Developer ID
          # Installer (signs the pkg), as separate base64-encoded .p12 files.
          MAC_CERTS_P12: ${{ secrets.MAC_CERTS_P12 }}
          MAC_INSTALLER_CERTS_P12: ${{ secrets.MAC_INSTALLER_CERTS_P12 }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        run: |
          if [ -z "$MAC_CERTS_P12" ]; then
            echo "No signing certificates configured; building unsigned."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p ci "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p ci "$KEYCHAIN"
          import_p12() {
            [ -z "$1" ] && return 0
            printf '%s' "$1" | base64 -d > "$RUNNER_TEMP/certs.p12"
            security import "$RUNNER_TEMP/certs.p12" -k "$KEYCHAIN" -P "$MAC_CERTS_PASSWORD" \
              -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/productbuild
            rm "$RUNNER_TEMP/certs.p12"
          }
          import_p12 "$MAC_CERTS_P12"
          import_p12 "$MAC_INSTALLER_CERTS_P12"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

      - name: Build macOS desktop application (arm64)
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN_FOR_PUBLISH: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build-commons

      - name: Package macOS desktop application (arm64)
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN_FOR_PUBLISH: ${{ secrets.GITHUB_TOKEN }}
        working-directory: apps/desktop
        run: |
          if [ -n "$APPLE_API_KEY_CONTENT" ]; then
            printf '%s' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/apple_api_key.p8"
            export APPLE_API_KEY="$RUNNER_TEMP/apple_api_key.p8"
          fi
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            export GH_TOKEN="$GITHUB_TOKEN_FOR_PUBLISH"
            package_args=(npm run package:mac)
          else
            package_args=(npm run package:mac -- --publish never)
          fi

          attempts=3
          for attempt in $(seq 1 "$attempts"); do
            echo "Running mac package attempt $attempt of $attempts"
            package_exit=0
            "${package_args[@]}" || package_exit=$?
            if [ "$package_exit" -eq 0 ]; then
              exit 0
            fi
            if [ "$attempt" -eq "$attempts" ]; then
              exit "$package_exit"
            fi
            echo "mac package failed with exit code $package_exit. Waiting before retry..."
            sleep $((10 * attempt))
          done

      - name: Upload macOS package artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg-arm64
          path: |
            apps/desktop/release/*.pkg
            apps/desktop/release/*.zip
            apps/desktop/release/latest-mac.yml

      - name: Upload macOS package to release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            apps/desktop/release/*.pkg
            apps/desktop/release/*.zip
            apps/desktop/release/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ github.token }}

  desktop-windows:
    name: Build Windows installer (x64)
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (x64)
        shell: pwsh
        working-directory: apps/desktop
        run: |
          $ErrorActionPreference = 'Stop'
          $attempts = 3
          for ($attempt = 1; $attempt -le $attempts; $attempt++) {
            Write-Host "Running package:win attempt $attempt of $attempts"
            & npm run package:win
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            if ($attempt -eq $attempts) {
              throw "package:win failed after $attempts attempts"
            }

            Write-Host "package:win failed with exit code $LASTEXITCODE. Waiting before retry..."
            Start-Sleep -Seconds (10 * $attempt)
          }

      - name: Upload installer to release
        if: github.event_name == 'release' && github.event.action == 'created' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag || github.event.release.tag_name }}
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.exe.blockmap
            apps/desktop/release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
